<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeFlow | Игровой Маркетплейс</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070709; color: #ededed; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background: radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.05), transparent 40%), radial-gradient(circle at 80% 100%, rgba(14, 165, 233, 0.05), transparent 40%); }
        .glass-panel { background: rgba(15, 15, 18, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-header { background: rgba(12, 12, 14, 0.8); backdrop-filter: blur(24px); }
        
        .page-section { display: none; opacity: 0; }
        .page-section.active { display: block; animation: fadeUp 0.3s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-item { transition: all 0.2s; color: #9ca3af; padding: 8px 16px; border-radius: 8px; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); font-weight: 500; }
        
        /* КНОПКИ ПОДКАТЕГОРИЙ (КАК ТЫ ХОТЕЛ) */
        .sub-btn { transition: all 0.2s; }
        .sub-btn.active { background: #4f46e5; color: white; border-color: transparent; }
        .sub-btn:not(.active) { background: rgba(255,255,255,0.05); color: #9ca3af; border: 1px solid rgba(255,255,255,0.05); }

        /* КАРТОЧКИ ОБЪЯВЛЕНИЙ (С КАРТИНКАМИ) */
        .product-card { transition: all 0.3s; cursor: pointer; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(99,102,241,0.4); box-shadow: 0 10px 30px -10px rgba(99,102,241,0.2); }
        .product-image-wrapper { height: 160px; overflow: hidden; position: relative; }
        .product-image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-image-wrapper img { transform: scale(1.05); }

        /* ПЛИТКИ КАТЕГОРИЙ (ДИЗАЙН КАК НА ТВОЕМ СКРИНШОТЕ) */
        .category-tile { transition: all 0.2s; cursor: pointer; background: #0c0c0e; border: 1px solid rgba(255,255,255,0.03); }
        .category-tile:hover { background: #151518; transform: translateY(-4px); border-color: rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .app-icon { transition: transform 0.3s; }
        .category-tile:hover .app-icon { transform: scale(1.1); }

        .swiper { border-radius: 20px; overflow: hidden; }
        .swiper-pagination-bullet { background: #fff; opacity: 0.4; }
        .swiper-pagination-bullet-active { background: #4f46e5; opacity: 1; }
        
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast-anim { animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: auto; }
        @keyframes slideInRight { 0% { transform: translateX(120%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="bg-mesh"></div>

    <header class="fixed top-6 left-1/2 -translate-x-1/2 w-[95%] max-w-6xl z-50 glass-header px-6 py-3 rounded-2xl flex justify-between items-center shadow-2xl border border-white/5">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('market')">
            <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(99,102,241,0.4)]">
                <i class='bx bx-store-alt text-2xl text-white'></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white hidden sm:block">Trade<span class="text-indigo-400">Flow</span></h1>
        </div>
        
        <nav class="hidden md:flex gap-2 font-medium text-sm">
            <button onclick="showPage('market')" id="nav-market" class="nav-item active"><i class='bx bx-grid-alt mr-1'></i> Маркет</button>
            <button onclick="showPage('sell')" id="nav-sell" class="nav-item"><i class='bx bx-plus-circle mr-1'></i> Продать</button>
            <button onclick="showPage('purchases')" id="nav-purchases" class="nav-item"><i class='bx bx-shopping-bag mr-1'></i> Покупки</button>
            <button onclick="showPage('messages')" id="nav-messages" class="nav-item"><i class='bx bx-message-square-dots mr-1'></i> Чат</button>
        </nav>

        <div id="auth-section">
            <button onclick="openAuthModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm shadow-[0_0_20px_rgba(99,102,241,0.3)]">Войти</button>
        </div>
        
        <div id="profile-section" class="hidden flex items-center gap-4">
            <div class="text-right hidden sm:block cursor-pointer" onclick="openProfile(document.getElementById('ui-username').innerText)">
                <p class="text-sm font-bold text-white hover:text-indigo-400 transition" id="ui-username">User</p>
                <p class="text-xs text-gray-400"><span id="ui-balance" class="text-green-400 font-bold">0</span> ₽</p>
            </div>
            <div class="w-11 h-11 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg cursor-pointer hover:opacity-80 transition border-2 border-indigo-400/30" onclick="logout()" title="Выйти">
                <i class='bx bx-log-out text-white text-lg'></i>
            </div>
        </div>
    </header>

    <main class="flex-1 mt-32 px-4 pb-12 max-w-6xl mx-auto w-full relative z-10">
        
        <!-- МАРКЕТ -->
        <section id="page-market" class="page-section active">
            
            <div class="swiper mySwiper mb-12 h-56 sm:h-72 shadow-2xl border border-white/5">
                <div class="swiper-wrapper" id="slider-wrapper"></div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>

            <div id="main-categories-container" class="flex flex-col gap-10 mb-16"></div>

            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3"><i class='bx bxs-hot text-orange-500'></i> 🔥 Свежие предложения от игроков</h2>
            <div id="random-products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- КАТЕГОРИЯ ИГРЫ -->
        <section id="page-category" class="page-section">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div class="flex items-center gap-4">
                    <button onclick="showPage('market')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 text-white transition"><i class='bx bx-arrow-back text-xl'></i></button>
                    <h2 class="text-3xl font-bold text-white" id="cat-title">Название</h2>
                </div>
                <input type="text" id="search-input" placeholder="Поиск по названию..." class="w-full sm:w-72 bg-[#111] border border-white/10 rounded-xl py-2.5 px-4 text-white outline-none focus:border-indigo-500 transition" oninput="debounceSearch()">
            </div>
            
            <div class="flex flex-wrap gap-2 mb-8" id="subcategory-filters"></div>
            <div id="category-products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- СТРАНИЦА ТОВАРА -->
        <section id="page-product" class="page-section max-w-5xl mx-auto">
            <!-- (Этот блок остался без изменений) -->
        </section>

        <!-- ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ И ОТЗЫВЫ -->
        <section id="page-profile" class="page-section max-w-5xl mx-auto">
            <!-- (Этот блок остался без изменений) -->
        </section>

        <!-- ПРОДАЖА (С ДОБАВЛЕНИЕМ ФОТО) -->
        <section id="page-sell" class="page-section max-w-3xl mx-auto">
             <!-- (Этот блок остался без изменений) -->
        </section>

        <!-- ПОКУПКИ И СООБЩЕНИЯ -->
        <section id="page-messages" class="page-section max-w-4xl mx-auto">
             <!-- (Этот блок остался без изменений) -->
        </section>

        <section id="page-purchases" class="page-section max-w-5xl mx-auto">
            <!-- (Этот блок остался без изменений) -->
        </section>

    </main>

    <!-- МОДАЛКА ВХОДА ЧЕРЕЗ VK (ФИНАЛЬНАЯ ВЕРСИЯ) -->
    <div id="auth-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/80 backdrop-blur-md transition-opacity">
        <div class="glass-panel border border-white/10 rounded-[2rem] p-10 max-w-sm w-full mx-4 relative animate-[fadeUp_0.3s_ease] text-center shadow-2xl">
            <button onclick="closeAuth()" class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 transition"><i class='bx bx-x text-xl'></i></button>
            
            <div class="w-20 h-20 mx-auto bg-[#0077FF] rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-[#0077FF]/40 border-2 border-white/10">
                <i class='bx bxl-vk text-5xl text-white'></i>
            </div>
            
            <h3 class="text-2xl font-black text-white mb-2">Вход в TradeFlow</h3>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">Для безопасных покупок и продаж необходимо войти в систему</p>

            <!-- ГАРАНТИРОВАННАЯ КНОПКА ВХОДА -->
            <a href="/api/auth/vk" class="w-full bg-[#0077FF] hover:bg-[#0066eb] text-white py-3.5 rounded-xl font-bold transition flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(0,119,255,0.3)] mb-4">
                <i class='bx bxl-vk text-2xl'></i> Войти через ВКонтакте
            </a>
            
            <div class="mt-6 pt-6 border-t border-white/5">
                <p class="text-[11px] text-gray-500 uppercase tracking-widest font-bold flex items-center justify-center gap-1"><i class='bx bx-check-shield text-lg'></i> Безопасный вход</p>
                <p class="text-xs text-gray-500 mt-1">Мы не получаем доступ к вашим паролям.</p>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ОТЗЫВА -->
    <div id="review-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/80 backdrop-blur-md">
        <!-- (Этот блок остался без изменений) -->
    </div>

    <div id="toast-container"></div>

    <script>
        // СЛАЙДЫ НА ГЛАВНОЙ
        const SLIDES =[
            { badge: "АКЦИЯ", color: "bg-indigo-600", title: "Весенняя распродажа! 🌸", text: "Скидки на аккаунты Dota 2 и CS2 до 50%", image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop" },
            { badge: "НОВИНКА", color: "bg-green-500", title: "Ключи Minecraft ⛏️", text: "Официальные ключи Java & Bedrock Edition", image: "https://images.unsplash.com/photo-1600189083288-5a82643a6814?q=80&w=1974&auto=format&fit=crop" },
            { badge: "ТОП ПРОДАЖ", color: "bg-orange-500", title: "Genshin Impact ✨", text: "Безопасный фарм примогемов и прокачка бездны", image: "https://images.unsplash.com/photo-1633511116664-ce88b9075e74?q=80&w=1974&auto=format&fit=crop" }
        ];

        // КАТЕГОРИИ С ЭМОДЗИ (Дизайн как на скриншоте)
        const CATEGORIES = {
            "CS2 🔫": { parent: "🎮 Компьютерные игры", icon: "bx-target-lock", color: "from-orange-500 to-red-500", subs:["Все", "Скины", "Аккаунты", "Буст"] },
            "Dota 2 🧙‍♂️": { parent: "🎮 Компьютерные игры", icon: "bxl-steam", color: "from-red-600 to-red-800", subs:["Все", "Предметы", "Аккаунты", "MMR Буст"] },
            "Valorant 🎯": { parent: "🎮 Компьютерные игры", icon: "bx-crosshair", color: "from-red-400 to-red-600", subs:["Все", "Points", "Аккаунты"] },
            "Minecraft ⛏️": { parent: "🎮 Компьютерные игры", icon: "bx-cube", color: "from-green-400 to-green-600", subs:["Все", "Лицензии", "Донат"] },
            "Genshin ✨": { parent: "📱 Мобильные игры", icon: "bx-star", color: "from-blue-400 to-indigo-500", subs:["Все", "Примогемы", "Аккаунты"] },
            "Roblox 🧱": { parent: "🎮 Компьютерные игры", icon: "bx-game", color: "from-gray-500 to-gray-700", subs:["Все", "Robux", "Питомцы"] },
            "Telegram ✈️": { parent: "🛠️ Программы и сервисы", icon: "bxl-telegram", color: "from-blue-400 to-blue-600", subs:["Все", "Premium", "Каналы"] },
            "Discord 👾": { parent: "🛠️ Программы и сервисы", icon: "bxl-discord", color: "from-indigo-400 to-indigo-600", subs:["Все", "Nitro", "Бусты"] },
            "Разное 📦": { parent: "📦 Разное", icon: "bx-package", color: "from-gray-600 to-gray-800", subs:["Все", "Остальное"] }
        };

        // --- ОСТАЛЬНОЙ JAVASCRIPT-КОД ОСТАЛСЯ БЕЗ ИЗМЕНЕНИЙ ---
        // (Я скопирую его сюда, чтобы у тебя был полный файл)

        let currentCategory = 'All', currentSubcategory = 'Все', currentSearch = '';
        let token = localStorage.getItem('tf_token');
        let currentChatUser = null;
        let chatInterval = null;
        let activeProduct = null;
        let myUserId = null;

        async function api(url, method = 'GET', body = null) {
            let headers = {};
            if(token) headers['Authorization'] = `Bearer ${token}`;
            if(body) headers['Content-Type'] = 'application/json';
            let res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
            if(res.status === 401) { logout(); throw new Error("Требуется авторизация"); }
            if(!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || "Ошибка сервера");
            }
            // Если ответ пустой (например, при удачном POST запросе без возвращаемого тела)
            if (res.headers.get("content-length") === "0" || res.status === 204) {
                 return {};
            }
            return res.json();
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            const icon = isSuccess ? "<i class='bx bx-check-circle text-2xl text-green-400'></i>" : "<i class='bx bx-error-circle text-2xl text-red-400'></i>";
            toast.className = `toast-anim glass-panel p-4 rounded-xl flex items-center gap-3 shadow-2xl border-l-4 ${isSuccess ? 'border-green-500' : 'border-red-500'} mb-2`;
            toast.innerHTML = `${icon}<span class="text-sm font-medium text-white">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showPage(pageId) {
            if(!token &&['sell', 'purchases', 'messages', 'product', 'profile'].includes(pageId)) {
                openAuthModal(); return;
            }
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            let target = document.getElementById('page-' + pageId);
            if(target) target.classList.add('active');
            
            let navId =['category', 'product', 'profile'].includes(pageId) ? 'market' : pageId;
            let navBtn = document.getElementById('nav-' + navId);
            if(navBtn) navBtn.classList.add('active');
            
            clearInterval(chatInterval);
            if(pageId === 'market') { renderSliders(); renderCategories(); loadRandomProducts(); }
            if(pageId === 'purchases') loadPurchases();
            if(pageId === 'product' && currentChatUser) { loadPrivateChat(); chatInterval = setInterval(loadPrivateChat, 3000); }
        }

        function renderSliders() {
            const wrapper = document.getElementById('slider-wrapper');
            if (wrapper.innerHTML.trim() !== '') return;
            SLIDES.forEach(s => {
                wrapper.innerHTML += `
                    <div class="swiper-slide relative flex items-center justify-center cursor-pointer group">
                        <img src="${s.image}" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-105 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-r from-[#070709] via-gray-900/60 to-transparent"></div>
                        <div class="relative z-10 text-left w-full px-8 md:px-16">
                            <span class="${s.color} text-white text-[10px] font-bold px-2 py-1 rounded mb-3 inline-block tracking-widest">${s.badge}</span>
                            <h2 class="text-2xl md:text-4xl font-bold text-white mb-2 drop-shadow-lg">${s.title}</h2>
                            <p class="text-sm md:text-lg text-gray-300 drop-shadow-md">${s.text}</p>
                        </div>
                    </div>`;
            });
            new Swiper(".mySwiper", { loop: true, autoplay: { delay: 4000 }, pagination: { el: ".swiper-pagination" }, navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" }});
        }

        // ОТРИСОВКА КАТЕГОРИЙ ПЛИТКАМИ
        function renderCategories() {
            const container = document.getElementById('main-categories-container');
            if (container.innerHTML.trim() !== '') return;
            
            const grouped = {};
            for (const[game, data] of Object.entries(CATEGORIES)) {
                if (!grouped[data.parent]) grouped[data.parent] = [];
                grouped[data.parent].push({name: game, ...data});
            }
            
            for (const [parent, games] of Object.entries(grouped)) {
                let html = `
                <div class="mb-4">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-1 h-6 bg-indigo-500 rounded-full"></div>
                        <h3 class="text-xl font-bold text-white">${parent}</h3>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                `;
                games.forEach(game => {
                    html += `
                        <div onclick="openCategoryView('${game.name}')" class="category-tile rounded-2xl p-5 flex flex-col items-center justify-center gap-3">
                            <div class="app-icon w-14 h-14 rounded-2xl bg-gradient-to-br ${game.color} flex items-center justify-center shadow-lg">
                                <i class='bx ${game.icon} text-3xl text-white'></i>
                            </div>
                            <span class="text-sm font-bold text-white text-center">${game.name}</span>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function createProductCardHTML(p) {
            let imgUrl = (p.images && p.images.length > 0) ? p.images[0] : 'https://images.unsplash.com/photo-1605901309584-818e25960b8f?q=80&w=400&auto=format&fit=crop';
            let wBadge = p.warranty ? `<div class="absolute top-2 right-2 bg-green-500/90 text-white text-[10px] font-bold px-2 py-1 rounded flex items-center gap-1 z-10"><i class='bx bx-shield-check'></i> Гарантия</div>` : '';
            return `
                <div onclick='openProduct(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="product-card glass-panel rounded-2xl flex flex-col overflow-hidden">
                    <div class="product-image-wrapper relative">
                        ${wBadge}
                        <img src="${imgUrl}" alt="Game">
                        <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/90 to-transparent text-xs text-indigo-300 font-bold uppercase tracking-wider">${p.subcategory}</div>
                    </div>
                    <div class="p-5 flex flex-col justify-between flex-1 bg-[#121214]">
                        <h3 class="text-sm font-bold text-white leading-tight line-clamp-2 mb-4">${p.title}</h3>
                        <p class="text-2xl font-black text-white">${p.price.toLocaleString()} ₽</p>
                    </div>
                </div>`;
        }

        async function loadRandomProducts() {
            try {
                let products = await api('/api/products');
                products = products.sort(() => 0.5 - Math.random()).slice(0, 8);
                let grid = document.getElementById('random-products-grid');
                grid.innerHTML = products.length ? '' : '<div class="col-span-full text-center py-6 text-gray-500">Пока нет объявлений</div>';
                products.forEach(p => grid.innerHTML += createProductCardHTML(p));
            } catch(e) {}
        }

        function openCategoryView(name) {
            currentCategory = name; currentSubcategory = "Все"; currentSearch = "";
            document.getElementById('cat-title').innerText = name;
            const subsContainer = document.getElementById('subcategory-filters');
            subsContainer.innerHTML = '';
            CATEGORIES[name].subs.forEach(sub => {
                subsContainer.innerHTML += `<button onclick="setSubcategory('${sub}')" class="sub-btn px-4 py-2 rounded-xl text-sm font-medium ${sub === 'Все' ? 'active' : ''}">${sub}</button>`;
            });
            showPage('category'); loadProducts();
        }

        function setSubcategory(sub) {
            currentSubcategory = sub;
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.trim() === sub));
            loadProducts();
        }

        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { currentSearch = document.getElementById('search-input').value; loadProducts(); }, 500);
        }

        async function loadProducts() {
            let url = `/api/products?category=${encodeURIComponent(currentCategory)}&subcategory=${encodeURIComponent(currentSubcategory)}&search=${encodeURIComponent(currentSearch)}`;
            let products = await api(url);
            let grid = document.getElementById('category-products-grid');
            grid.innerHTML = products.length ? '' : '<div class="col-span-full text-center py-10 text-gray-500">В этой категории пока нет товаров</div>';
            products.forEach(p => grid.innerHTML += createProductCardHTML(p));
        }

        function openProduct(p) {
            activeProduct = p; currentChatUser = p.seller;
            document.getElementById('prod-category').innerText = p.category + " / " + p.subcategory;
            document.getElementById('prod-title').innerText = p.title;
            document.getElementById('prod-desc').innerText = p.description || "Описания нет";
            document.getElementById('prod-price').innerText = p.price.toLocaleString() + " ₽";
            document.getElementById('prod-warranty').classList.toggle('hidden', !p.warranty);
            document.getElementById('prod-seller-name').innerText = p.seller;
            document.getElementById('prod-buy-btn').onclick = () => buyProduct(p.id);
            
            const imgContainer = document.getElementById('prod-image-container');
            const imgWrapper = document.getElementById('prod-images');
            if(p.images && p.images.length > 0) {
                imgContainer.classList.remove('hidden');
                imgWrapper.innerHTML = '';
                p.images.forEach(img => {
                    imgWrapper.innerHTML += `<div class="swiper-slide"><img src="${img}" class="w-full h-full object-cover"></div>`;
                });
                new Swiper(".productSwiper", { pagination: { el: ".swiper-pagination" }});
            } else {
                imgContainer.classList.add('hidden');
            }
            showPage('product');
        }

        async function buyProduct(id) {
            if(!confirm("Оплатить товар с баланса?")) return;
            try {
                let res = await api(`/api/buy/${id}`, 'POST');
                showToast(`Успешно! Заказ ${res.order_code}`);
                await checkAuth();
                showPage('purchases');
            } catch(e) { showToast(e.message, 'error'); }
        }

        async function openProfile(username) {
            try {
                let data = await api(`/api/users/${username}`);
                document.getElementById('profile-name').innerText = data.username;
                let grid = document.getElementById('profile-products');
                grid.innerHTML = data.products.length ? '' : '<p class="text-gray-500">Нет активных товаров</p>';
                data.products.forEach(p => grid.innerHTML += createProductCardHTML({...p, seller: username}));
                
                let revBox = document.getElementById('profile-reviews');
                revBox.innerHTML = data.reviews.length ? '' : '<p class="text-gray-500">Пока нет отзывов</p>';
                data.reviews.forEach(r => {
                    let replyHtml = r.reply ? `<div class="mt-3 ml-6 p-3 bg-white/5 border-l-2 border-indigo-500 rounded-r-xl text-sm"><span class="text-indigo-400 font-bold text-xs">Ответ продавца:</span><p class="text-gray-300 mt-1">${r.reply}</p></div>` : '';
                    let replyBtn = (myUserId === data.id && !r.reply) ? `<button onclick="replyToReview(${r.id})" class="text-xs text-indigo-400 mt-2 font-bold hover:text-white transition">Ответить</button>` : '';
                    revBox.innerHTML += `<div class="glass-panel p-5 rounded-2xl border border-white/5"><div class="flex justify-between items-center mb-2"><span class="font-bold text-white flex items-center gap-2"><i class='bx bx-user-circle text-gray-400 text-lg'></i> ${r.buyer}</span><span class="text-xs text-gray-500">${r.date}</span></div><p class="text-gray-300 text-sm leading-relaxed">${r.text}</p>${replyHtml}${replyBtn}</div>`;
                });
                showPage('profile');
            } catch(e) { showToast(e.message, 'error'); }
        }

        async function replyToReview(reviewId) {
            let text = prompt("Ваш ответ на отзыв:");
            if(!text) return;
            try {
                await api(`/api/reviews/${reviewId}/reply`, 'POST', {reply: text});
                showToast("Ответ добавлен"); openProfile(document.getElementById('profile-name').innerText);
            } catch(e) { showToast(e.message, 'error'); }
        }

        async function loadPurchases() {
            try {
                let purchases = await api('/api/purchases');
                let grid = document.getElementById('purchases-grid');
                grid.innerHTML = purchases.length ? '' : '<div class="glass-panel p-10 rounded-3xl text-center text-gray-500"><i class="bx bx-shopping-bag text-5xl mb-3"></i><p>Вы еще ничего не купили.</p></div>';
                purchases.forEach(p => {
                    grid.innerHTML += `
                        <div class="glass-panel p-6 rounded-2xl border border-white/10 relative">
                            <div class="flex justify-between items-start mb-4"><h3 class="font-bold text-white text-lg">${p.title}</h3><span class="text-[10px] bg-white/10 px-2 py-1 rounded text-gray-300">${p.order_code}</span></div>
                            <div class="bg-[#050507] p-4 rounded-xl border border-indigo-500/20 text-indigo-300 font-mono text-sm mb-4">${p.data}</div>
                            <button onclick="openReviewModal(${p.product_id}, ${p.seller_id})" class="text-sm text-indigo-400 hover:text-white transition flex items-center gap-1 font-bold"><i class='bx bx-edit'></i> Оставить/Изменить отзыв</button>
                        </div>`;
                });
            } catch(e) {}
        }

        function openReviewModal(prodId, sellerId) {
            document.getElementById('review-product-id').value = prodId;
            document.getElementById('review-seller-id').value = sellerId;
            document.getElementById('review-modal').classList.remove('hidden');
        }

        async function submitReview() {
            let text = document.getElementById('review-text').value;
            let prodId = document.getElementById('review-product-id').value;
            let sellerId = document.getElementById('review-seller-id').value;
            if(!text.trim()) return showToast("Напишите текст отзыва", "error");
            try {
                await api('/api/reviews', 'POST', {product_id: prodId, seller_id: sellerId, text: text});
                showToast("Отзыв опубликован!");
                document.getElementById('review-modal').classList.add('hidden');
                document.getElementById('review-text').value = '';
            } catch(e) { showToast(e.message, 'error'); }
        }

        async function loadPrivateChat() {
            if(!currentChatUser) return;
            try {
                let msgs = await api(`/api/messages/${currentChatUser}`);
                let box = document.getElementById('private-chat-box');
                let isBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 20;
                box.innerHTML = msgs.length ? '' : '<div class="h-full flex flex-col items-center justify-center text-gray-500"><i class="bx bx-chat text-4xl mb-2"></i><p class="text-sm text-center">Напишите продавцу.</p></div>';
                msgs.forEach(m => {
                    let isMe = m.sender !== currentChatUser;
                    box.innerHTML += `<div class="w-fit max-w-[85%] p-3 rounded-2xl text-sm ${isMe ? 'bg-indigo-600 text-white self-end rounded-tr-sm' : 'bg-white/10 text-gray-200 self-start rounded-tl-sm'}">${m.text}</div>`;
                });
                if(isBottom) box.scrollTop = box.scrollHeight;
            } catch(e) {}
        }

        async function sendPrivateMessage() {
            let input = document.getElementById('private-chat-input');
            if(!input.value.trim() || !currentChatUser) return;
            try {
                await api(`/api/messages/${currentChatUser}`, 'POST', {text: input.value});
                input.value = ''; loadPrivateChat();
            } catch(e) { showToast(e.message, 'error'); }
        }

        async function blockUser(username) {
            if(!confirm(`Заблокировать пользователя ${username}?`)) return;
            try { await api(`/api/users/${username}/block`, 'POST'); showToast("Заблокирован"); } catch(e) { showToast(e.message, 'error'); }
        }

        function initSellForm() {
            const catSelect = document.getElementById('sell-category');
            catSelect.innerHTML = '';
            for (const name in CATEGORIES) catSelect.innerHTML += `<option value="${name}">${name}</option>`;
            updateSellSubcategories();
        }
        function updateSellSubcategories() {
            const subSelect = document.getElementById('sell-subcategory');
            subSelect.innerHTML = '';
            CATEGORIES[document.getElementById('sell-category').value].subs.forEach(sub => {
                if(sub !== "Все") subSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
            });
        }
        
        function addImageInput() {
            const container = document.getElementById('image-inputs-container');
            const inputs = container.querySelectorAll('input');
            if(inputs.length >= 8) return showToast("Максимум 8 фотографий", "error");
            container.innerHTML += `<input type="url" placeholder="https://... (фото ${inputs.length + 1})" class="img-input w-full bg-[#0a0a0c] border border-white/10 rounded-xl p-3.5 text-sm text-white outline-none mt-2">`;
            document.getElementById('img-counter').innerText = `${inputs.length + 1}/8`;
        }

        async function submitProduct(e) {
            e.preventDefault();
            let images = Array.from(document.querySelectorAll('.img-input')).map(i => i.value).filter(v => v.trim() !== '');
            let data = {
                category: document.getElementById('sell-category').value, subcategory: document.getElementById('sell-subcategory').value,
                title: document.getElementById('sell-title').value, description: document.getElementById('sell-desc').value,
                warranty: document.getElementById('sell-warranty').checked, price: document.getElementById('sell-price').value,
                data: `L: ${document.getElementById('sell-login').value} | P: ${document.getElementById('sell-password').value}`,
                images: images
            };
            try { await api('/api/sell', 'POST', data); showToast("Товар опубликован!"); document.getElementById('sell-form').reset(); openCategoryView(data.category); } 
            catch(e) { showToast(e.message, 'error'); }
        }

        async function checkAuth() {
            if(!token) return;
            try {
                let user = await api('/api/user');
                myUserId = user.id;
                document.getElementById('auth-section').classList.add('hidden');
                let profileSection = document.getElementById('profile-section');
                profileSection.classList.remove('hidden');
                document.getElementById('ui-username').innerText = user.username;
                document.getElementById('ui-balance').innerText = user.balance.toLocaleString('ru-RU');
                if(user.avatar_url) profileSection.querySelector('.w-11.h-11').innerHTML = `<img src="${user.avatar_url}" class="w-full h-full rounded-full object-cover">`;
            } catch(e) { token = null; localStorage.removeItem('tf_token'); }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const urlError = urlParams.get('error');

            if (urlToken) {
                localStorage.setItem('tf_token', urlToken); token = urlToken;
                window.history.replaceState({}, document.title, "/");
                showToast("Успешный вход через VK!");
            } else if (urlError) {
                window.history.replaceState({}, document.title, "/");
                showToast("Ошибка авторизации VK", "error");
            }

            await checkAuth(); 
            initSellForm(); 
            showPage('market'); 
        });

        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('auth-modal').classList.add('hidden'); }
        function logout() { token = null; localStorage.removeItem('tf_token'); location.reload(); }
    </script>
</body>
</html>
